 services:
  - type: web
    name: memeforge
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    disk:
      name: memeforge-data
      mountPath: /opt/render/project/src
      sizeGB: 1